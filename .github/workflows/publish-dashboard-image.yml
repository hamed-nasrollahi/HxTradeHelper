name: Publish dashboard Docker image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Dashboard version to publish, for example 1.0.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hx-trade-dashboard

jobs:
  publish:
    name: Build and publish dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dashboard version
        id: version
        working-directory: dashboard
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          INPUT_VERSION="${INPUT_VERSION#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$INPUT_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Requested version ${INPUT_VERSION} does not match dashboard/package.json version ${PACKAGE_VERSION}"
            exit 1
          fi
          echo "version=${INPUT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_tag=v${INPUT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Dashboard version: ${INPUT_VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Compose environment
        working-directory: dashboard
        run: cp .env.sample .env

      - name: Validate Docker Compose build
        working-directory: dashboard
        run: docker compose build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: dashboard
          file: dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version_tag }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=HxTradeHelper Dashboard
            org.opencontainers.image.description=Trading journal analytics dashboard for HxTradeHelper
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
