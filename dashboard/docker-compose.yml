services:
  dashboard:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    # DB connection, import API key and dashboard login all come from .env
    # (HX_DB_*, HX_API_KEY, DASHBOARD_USER / DASHBOARD_PASSWORD). The
    # database itself is external - apply sql/db-init.sql + sql/dashboard.sql
    # to it once, manually.
    env_file: .env
    volumes:
      - dashboard-data:/app/data

volumes:
  dashboard-data:
